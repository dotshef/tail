# UI labels for the exercise page and answer key, keyed by language.
# Used by build-pdf.py for per-language rendering of section headers and titles.
# Add a new language by appending a top-level key with the same shape.
#
# Placeholders:
#   {n} — chapter number (1-based, integer)

en:
  exercise_title: "Chapter {n} — Exercises"
  comprehension: "Comprehension"
  vocabulary: "Vocabulary"
  grammar: "Grammar"
  answer_key_title: "Answer Key"
  chapter_label: "Chapter {n}"

jp:
  exercise_title: "第{n}章 練習問題"
  comprehension: "読解"
  vocabulary: "語彙"
  grammar: "文法"
  answer_key_title: "解答"
  chapter_label: "第{n}章"
